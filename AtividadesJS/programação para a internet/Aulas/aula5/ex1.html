<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 5 - Funções (26/03)</title>
    <script>
        function calcularAreaTerreno() {
            let l = Number(document.getElementById("L").value);
            let c = Number(document.getElementById("C").value);

            const r = l * c

            document.getElementById("S").textContent = r;
        }
    </script>
</head>
<body>
    <input type="number" id="L" placeholder="Digite a largura">
    <input type="number" id="C" placeholder="Digite o comprimento">
    <br><br>
    <button onclick="calcularAreaTerreno()">Click</button>
    <br>
    <p>Resultado:  <span id ="S"></span></p>
</body>
</html>
